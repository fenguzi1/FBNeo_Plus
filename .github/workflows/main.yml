name: Build FBNeo Plus for iOS
on: [workflow_dispatch]

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # 自动拉取可能存在的子模块

      - name: Build and Package
        run: |
          # 1. 全自动寻找 Makefile 所在的准确位置
          echo "Scanning for Makefile..."
          # 查找包含 libretro 的 Makefile
          MAKEFILE_PATH=$(find . -name "*Makefile.libretro*" | head -n 1)
          
          if [ -z "$MAKEFILE_PATH" ]; then
            echo "Error: Could not find any libretro Makefile!"
            ls -R # 找不到就打印全量目录结构方便我帮你分析
            exit 1
          fi
          
          MAKEFILE_DIR=$(dirname "$MAKEFILE_PATH")
          MAKEFILE_NAME=$(basename "$MAKEFILE_PATH")
          echo "Found $MAKEFILE_NAME in: $MAKEFILE_DIR"
          
          # 2. 进入该目录并执行编译
          cd "$MAKEFILE_DIR"
          make -f "$MAKEFILE_NAME" platform=ios-arm64 -j$(sysctl -n hw.ncpu)
          
          # 3. 寻找生成的 .dylib 并提取到根目录
          echo "Searching for compiled core..."
          find . -name "*.dylib" -exec mv {} "${{ github.workspace }}/fbneo_plus" \;
          
      - name: Create Info File
        run: |
          cat <<EOF > fbneo_plus.info
          display_name = "Arcade (FBNeo Plus - Hack Edition)"
          authors = "Team FBNeo & lrf739146825"
          supported_extensions = "zip|7z|dat|neogeo"
          corename = "FBNeo Plus"
          manufacturer = "Various"
          categories = "Emulator"
          systemname = "Arcade (various)"
          database = "FBNeo - Arcade Games"
          license = "Non-commercial"
          permissions = ""
          display_version = "v1.0.0.3"
          supports_no_game = "false"
          EOF

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FBNeo_Plus_iOS
          path: |
            fbneo_plus
            fbneo_plus.info
