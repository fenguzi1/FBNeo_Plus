name: Build FBNeo Plus for iOS
on: [workflow_dispatch]

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Core
        run: |
          # 1. 尝试进入 libretro 目录
          # 根据日志，源码应该在 src 目录下
          if [ -d "src/burner/libretro" ]; then
            cd src/burner/libretro
          elif [ -d "src/libretro" ]; then
            cd src/libretro
          fi
          
          echo "Current Dir: $(pwd)"
          
          # 2. 强行执行编译
          # 如果找不到 Makefile.libretro，就尝试用通用的 make 指令
          # 很多修改版可能直接用了主 Makefile 并通过参数切换
          if [ -f "Makefile.libretro" ]; then
             make -f Makefile.libretro platform=ios-arm64 -j$(sysctl -n hw.ncpu)
          elif [ -f "Makefile" ]; then
             make platform=ios-arm64 -j$(sysctl -n hw.ncpu)
          else
             # 如果实在没有，就回到根目录用主 Makefile 尝试编译 libretro 目标
             cd ${{ github.workspace }}
             make -f makefile.sdl platform=ios-arm64 -j$(sysctl -n hw.ncpu) || make platform=ios-arm64 -j$(sysctl -n hw.ncpu)
          fi
          
          # 3. 提取编译出的文件
          find ${{ github.workspace }} -name "*.dylib" -exec mv {} ${{ github.workspace }}/fbneo_plus \;
          
      - name: Create Info File
        run: |
          cat <<EOF > fbneo_plus.info
          display_name = "Arcade (FBNeo Plus - Hack Edition)"
          authors = "Team FBNeo & lrf739146825"
          supported_extensions = "zip|7z|dat|neogeo"
          corename = "FBNeo Plus"
          systemname = "Arcade (various)"
          display_version = "v1.0.0.3"
          EOF

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FBNeo_Plus_iOS
          path: |
            fbneo_plus
            fbneo_plus.info
